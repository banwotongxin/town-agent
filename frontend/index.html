<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博小镇 V2 - 交互界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            height: 90vh;
        }

        .map-container {
            flex: 2;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 24px;
        }

        #townMap {
            flex: 1;
            background: #f0f0f0;
            border-radius: 10px;
            cursor: crosshair;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
        }

        .user-message {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .agent-message {
            background: #e0e0e0;
            color: #333;
            margin-right: auto;
        }

        .message-sender {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        #messageInput:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .send-btn:hover {
            background: #764ba2;
        }

        .status {
            padding: 10px;
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 14px;
        }

        .agent-info {
            padding: 10px;
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 14px;
        }

        .loading {
            color: #666;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
            }
            
            .map-container, .chat-container {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="map-container">
            <h1>🏙️ 赛博小镇 V2</h1>
            <div id="status" class="status">状态: 正在加载...</div>
            <div id="agentInfo" class="agent-info" style="display: none;"></div>
            <canvas id="townMap"></canvas>
            <div class="controls">
                <button class="control-btn" onclick="moveUp()">⬆️ 上</button>
                <button class="control-btn" onclick="moveDown()">⬇️ 下</button>
                <button class="control-btn" onclick="moveLeft()">⬅️ 左</button>
                <button class="control-btn" onclick="moveRight()">➡️ 右</button>
                <button class="control-btn" onclick="resetPosition()">🔄 重置位置</button>
                <button class="control-btn" onclick="refreshAgents()">🔄 刷新角色</button>
            </div>
        </div>
        
        <div class="chat-container">
            <h1>💬 对话</h1>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 赛博小镇前端 JavaScript 代码 ====================
        // 
        // 这个脚本负责前端的交互逻辑，包括：
        // 1. 绘制小镇地图和角色
        // 2. 处理用户移动（键盘控制）
        // 3. 检测用户与角色的距离
        // 4. 发送消息到后端并显示回复
        // 5. 显示角色信息
        
        // 获取HTML元素
        const canvas = document.getElementById('townMap');  // 画布元素，用于绘制小镇地图
        const ctx = canvas.getContext('2d');  // 2D绘图上下文，用于在画布上画图
        const statusDiv = document.getElementById('status');  // 状态显示区域
        const agentInfoDiv = document.getElementById('agentInfo');  // 角色信息显示区域
        const chatMessages = document.getElementById('chatMessages');  // 聊天消息显示区域
        const messageInput = document.getElementById('messageInput');  // 消息输入框

        // 全局变量
        let agents = [];  // 角色列表，从服务器加载
        let userPosition = { x: 50, y: 50 };  // 用户在地图上的位置（百分比坐标）
        let selectedAgent = null;  // 当前选中的角色（靠近的角色）
        let conversationHistory = [];  // 对话历史，保存与角色的聊天记录
        let userCursor = { visible: true, x: 0, y: 0 };  // 用户光标状态

        // 角色颜色配置 - 每个职业对应一个颜色
        const AGENT_COLORS = {
            '作家': '#e91e63',      // 粉红色
            '医生': '#4caf50',      // 绿色
            '程序员': '#2196f3',    // 蓝色
            '教师': '#ff9800',      // 橙色
            '艺术家': '#9c27b0',    // 紫色
            '工程师': '#00bcd4',    // 青色
            '科学家': '#795548',    // 棕色
            '商人': '#607d8b'       // 灰蓝色
        };

        // 角色图标配置 - 每个职业对应一个emoji图标
        const AGENT_ICONS = {
            '作家': '✒️',      // 钢笔
            '医生': '⚕️',      // 医疗符号
            '程序员': '💻',    // 电脑
            '教师': '📚',      // 书籍
            '艺术家': '🎨',    // 调色板
            '工程师': '🔧',    // 扳手
            '科学家': '🔬',    // 显微镜
            '商人': '💼'
        };

        const ANIME_CHARACTERS = {
            '作家': 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=anime%20writer%20character%20cute%20style&image_size=square',
            '医生': 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=anime%20doctor%20character%20cute%20style&image_size=square',
            '程序员': 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=anime%20programmer%20character%20cute%20style&image_size=square',
            '教师': 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=anime%20teacher%20character%20cute%20style&image_size=square',
            '艺术家': 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=anime%20artist%20character%20cute%20style&image_size=square',
            '工程师': 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=anime%20engineer%20character%20cute%20style&image_size=square',
            '科学家': 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=anime%20scientist%20character%20cute%20style&image_size=square',
            '商人': 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=anime%20businessman%20character%20cute%20style&image_size=square'
        };

        // 预加载二次元角色图像
        // 这样在绘制时可以快速显示，不需要等待图片加载
        const characterImages = {};
        Object.keys(ANIME_CHARACTERS).forEach(profession => {
            const img = new Image();  // 创建一个新的图片对象
            img.src = ANIME_CHARACTERS[profession];  // 设置图片URL
            characterImages[profession] = img;  // 保存到字典中
        });

        /**
         * 调整画布大小 - 当窗口大小改变时调用
         * 
         * 这个函数确保画布始终适应容器的大小。
         * 就像是给画框换不同大小的画布。
         */
        function resizeCanvas() {
            const container = canvas.parentElement;  // 获取画布的父容器
            canvas.width = container.clientWidth - 40;   // 设置宽度（减去40像素留边距）
            canvas.height = container.clientHeight - 100; // 设置高度（减去100像素留给控制按钮）
            drawMap();  // 重新绘制地图
        }

        /**
         * 绘制地图 - 在画布上绘制整个小镇
         * 
         * 这个函数是绘制的核心，按顺序绘制：
         * 1. 清空画布
         * 2. 绘制背景网格
         * 3. 绘制建筑物
         * 4. 绘制所有角色
         * 5. 绘制用户
         */
        function drawMap() {
            // 清空画布 - 清除之前绘制的所有内容
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景网格 - 让地图看起来更有条理
            ctx.strokeStyle = '#e0e0e0';  // 设置线条颜色为浅灰色
            ctx.lineWidth = 1;  // 设置线条宽度为1像素
            // 绘制垂直线
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath();  // 开始一条新路径
                ctx.moveTo(x, 0);  // 移动到起点 (x, 0)
                ctx.lineTo(x, canvas.height);  // 画线到终点 (x, 高度)
                ctx.stroke();  // 绘制路径
            }
            // 绘制水平线
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // 绘制建筑物 - 图书馆、医院等
            drawBuildings();

            // 绘制所有角色 - 遍历角色列表，逐个绘制
            agents.forEach(agent => {
                drawAgent(agent);
            });

            // 绘制用户 - 显示用户在地图上的位置
            drawUser();
        }

        function drawBuildings() {
            const buildings = [
                { x: 100, y: 100, width: 80, height: 60, name: '图书馆', color: '#795548' },
                { x: 300, y: 150, width: 100, height: 80, name: '医院', color: '#4caf50' },
                { x: 500, y: 100, width: 90, height: 70, name: '学校', color: '#ff9800' },
                { x: 200, y: 300, width: 120, height: 90, name: '科技园', color: '#2196f3' },
                { x: 450, y: 350, width: 100, height: 80, name: '艺术馆', color: '#9c27b0' }
            ];

            buildings.forEach(building => {
                ctx.fillStyle = building.color;
                ctx.fillRect(building.x, building.y, building.width, building.height);
                
                ctx.fillStyle = 'white';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(building.name, building.x + building.width / 2, building.y + building.height / 2);
            });
        }

        function drawAgent(agent) {
            const x = (agent.x / 100) * canvas.width;
            const y = (agent.y / 100) * canvas.height;
            const color = AGENT_COLORS[agent.profession] || '#666';
            const icon = AGENT_ICONS[agent.profession] || '👤';

            // 绘制圆形背景
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = selectedAgent === agent ? '#ff0000' : '#333';
            ctx.lineWidth = selectedAgent === agent ? 3 : 1;
            ctx.stroke();

            // 绘制二次元图像
            const img = characterImages[agent.profession];
            if (img && img.complete) {
                const size = 30;
                ctx.drawImage(img, x - size/2, y - size/2, size, size);
            } else {
                // 绘制图标作为备选
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(icon, x, y);
            }

            // 绘制名字
            ctx.fillStyle = '#333';
            ctx.font = '12px Arial';
            ctx.fillText(agent.name, x, y + 35);
        }

        function drawUser() {
            const x = (userPosition.x / 100) * canvas.width;
            const y = (userPosition.y / 100) * canvas.height;

            // 绘制光标
            if (userCursor.visible) {
                ctx.beginPath();
                ctx.arc(x, y - 25, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#ff6b6b';
                ctx.fill();
                
                // 绘制光标箭头
                ctx.beginPath();
                ctx.moveTo(x, y - 35);
                ctx.lineTo(x - 4, y - 29);
                ctx.lineTo(x + 4, y - 29);
                ctx.fill();
            }

            ctx.beginPath();
            ctx.arc(x, y, 15, 0, Math.PI * 2);
            ctx.fillStyle = '#ff5722';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🧑', x, y);

            ctx.fillStyle = '#333';
            ctx.font = '12px Arial';
            ctx.fillText('你', x, y + 30);
        }

        /**
         * 向上移动 - 用户按上键或W键时调用
         * 
         * 就像是控制游戏角色向上走。
         */
        function moveUp() {
            // 减少y坐标（向上移动），但不小于5（边界限制）
            userPosition.y = Math.max(5, userPosition.y - 5);
            drawMap();  // 重新绘制地图，显示新位置
            checkProximity();  // 检查是否靠近某个角色
        }

        /**
         * 向下移动 - 用户按下键或S键时调用
         */
        function moveDown() {
            // 增加y坐标（向下移动），但不大于95（边界限制）
            userPosition.y = Math.min(95, userPosition.y + 5);
            drawMap();
            checkProximity();
        }

        /**
         * 向左移动 - 用户按左键或A键时调用
         */
        function moveLeft() {
            // 减少x坐标（向左移动），但不小于5（边界限制）
            userPosition.x = Math.max(5, userPosition.x - 5);
            drawMap();
            checkProximity();
        }

        /**
         * 向右移动 - 用户按右键或D键时调用
         */
        function moveRight() {
            // 增加x坐标（向右移动），但不大于95（边界限制）
            userPosition.x = Math.min(95, userPosition.x + 5);
            drawMap();
            checkProximity();
        }

        /**
         * 重置位置 - 把用户移回地图中心
         * 
         * 就像是游戏中的“重生”功能。
         */
        function resetPosition() {
            userPosition = { x: 50, y: 50 };  // 设置为中心位置 (50%, 50%)
            drawMap();
            checkProximity();
        }

        /**
         * 检查距离 - 检测用户是否靠近某个角色
         * 
         * 这个函数计算用户与每个角色的距离，
         * 如果距离小于阈值（15），就认为用户靠近了这个角色。
         * 
         * 就像是在游戏中进入NPC的对话范围。
         */
        function checkProximity() {
            const threshold = 15;  // 距离阈值，小于这个值就算“靠近”
            let nearbyAgent = null;  // 初始化 nearbyAgent 为 null

            // 遍历所有角色，计算距离
            agents.forEach(agent => {
                // 使用勾股定理计算两点之间的距离
                // distance = sqrt((x2-x1)^2 + (y2-y1)^2)
                const distance = Math.sqrt(
                    Math.pow(userPosition.x - agent.x, 2) +  // x轴距离的平方
                    Math.pow(userPosition.y - agent.y, 2)     // y轴距离的平方
                );
                // 如果距离小于阈值，说明用户靠近了这个角色
                if (distance < threshold) {
                    nearbyAgent = agent;
                }
            });

            if (nearbyAgent && nearbyAgent !== selectedAgent) {
                selectedAgent = nearbyAgent;
                showAgentInfo(nearbyAgent);
                addSystemMessage(`你遇到了 ${nearbyAgent.name}（${nearbyAgent.profession}）`);
            } else if (!nearbyAgent && selectedAgent) {
                selectedAgent = null;
                hideAgentInfo();
            }

            drawMap();
        }

        function showAgentInfo(agent) {
            agentInfoDiv.style.display = 'block';
            agentInfoDiv.innerHTML = `
                <strong>${agent.name}</strong> (${agent.profession})<br>
                年龄: ${agent.age}<br>
                性格: ${agent.personality}<br>
                点击对话按钮开始交流
            `;
        }

        function hideAgentInfo() {
            agentInfoDiv.style.display = 'none';
        }

        function addSystemMessage(message) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.style.background = '#fff3cd';
            msgDiv.style.borderLeft = '4px solid #ffc107';
            msgDiv.innerHTML = `<div class="message-sender">系统</div>${message}`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addUserMessage(message) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user-message';
            msgDiv.innerHTML = `<div class="message-sender">你</div>${message}`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addAgentMessage(agentName, message) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message agent-message';
            msgDiv.innerHTML = `<div class="message-sender">${agentName}</div>${message}`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        /**
         * 发送消息 - 用户与角色对话的核心功能
         * 
         * 这个函数处理用户发送消息的完整流程：
         * 1. 获取用户输入
         * 2. 检查是否靠近角色
         * 3. 显示用户消息
         * 4. 发送请求到后端服务器
         * 5. 等待AI回复
         * 6. 显示角色回复
         * 7. 更新对话历史
         * 
         * 就像是在微信上发消息：
         * - 输入文字
         * - 点击发送
         * - 看到“对方正在输入...”
         * - 收到回复
         */
        async function sendMessage() {
            // 获取用户输入的消息，并去除首尾空格
            const message = messageInput.value.trim();
            // 如果消息为空，直接返回，不发送
            if (!message) return;

            // 检查是否靠近某个角色
            // 如果没有选中的角色，提示用户先移动到角色附近
            if (!selectedAgent) {
                addSystemMessage('请先移动到某个角色附近！');
                return;
            }

            // 在聊天窗口显示用户的消息
            addUserMessage(message);
            // 清空输入框，准备下一次输入
            messageInput.value = '';

            // 显示加载状态 - “正在思考..."
            // 这样用户知道系统正在处理，不会以为卡住了
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message loading';
            loadingDiv.innerHTML = `<div class="message-sender">${selectedAgent.name}</div>正在思考...`;
            chatMessages.appendChild(loadingDiv);
            // 滚动到最新消息
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                // 发送POST请求到后端服务器的 /api/chat 接口
                // fetch 是浏览器内置的网络请求函数
                const response = await fetch('/api/chat', {
                    method: 'POST',  // 使用POST方法发送数据
                    headers: {
                        'Content-Type': 'application/json',  // 告诉服务器我们发送的是JSON格式
                    },
                    body: JSON.stringify({  // 把JavaScript对象转换成JSON字符串
                        user_input: message,  // 用户输入的消息
                        target_agent_id: selectedAgent.id,  // 目标角色的ID
                        conversation_history: conversationHistory  // 对话历史，让AI知道之前的聊天内容
                    })
                });

                // 检查响应状态
                // 如果response.ok为false，说明请求失败（比如网络错误、服务器错误等）
                if (!response.ok) {
                    throw new Error('网络请求失败');
                }

                // 解析服务器返回的JSON数据
                const data = await response.json();
                
                // 移除“正在思考...”的加载消息
                chatMessages.removeChild(loadingDiv);
                
                // 在聊天窗口显示AI的回复
                addAgentMessage(data.agent_name, data.response);
                
                // 更新对话历史，保存这次的聊天记录
                // 这样下次对话时，AI就能记住这次交流
                conversationHistory = data.conversation_history || [];
                
            } catch (error) {
                // 如果发生错误（比如网络断开、服务器宕机等）
                // 移除加载消息
                chatMessages.removeChild(loadingDiv);
                // 显示错误信息给用户
                addSystemMessage(`错误: ${error.message}`);
            }
        }

        async function refreshAgents() {
            statusDiv.textContent = '状态: 正在刷新角色...';
            try {
                const response = await fetch('/api/agents');
                if (!response.ok) {
                    throw new Error('获取角色列表失败');
                }
                agents = await response.json();
                statusDiv.textContent = `状态: 已加载 ${agents.length} 个角色`;
                drawMap();
                checkProximity();
            } catch (error) {
                statusDiv.textContent = `状态: 错误 - ${error.message}`;
                addSystemMessage(`无法加载角色: ${error.message}`);
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    moveUp();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    moveDown();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    moveLeft();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    moveRight();
                    break;
            }
        });

        // 窗口大小改变时重新绘制
        window.addEventListener('resize', resizeCanvas);

        // 初始化
        window.onload = function() {
            resizeCanvas();
            refreshAgents();
        };
    </script>
</body>
</html>
