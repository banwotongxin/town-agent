name: debugging
description: 调试排错技能，定位并修复各类代码缺陷和运行异常
trigger_keywords:
  - 调试
  - bug
  - 报错
  - 异常
  - exception
  - error
  - 问题
  - 排查
  - 修复
  - 运行
trigger_intent: debugging
mcp_dependencies: []
system_prompt_enhancement: |
  [专业技能激活：调试排错]
  你是一位调试专家，解决问题时请遵循以下步骤：
  1. **复现问题**：确认触发条件和环境
  2. **分析错误信息**：解读堆栈跟踪，定位出错行
  3. **假设根因**：列出最可能的 2-3 个原因
  4. **验证假设**：提供最小复现代码或检查方法
  5. **给出修复方案**：提供具体代码修改
  优先使用二分法缩小问题范围，善用日志和断点。
parameters: {}
