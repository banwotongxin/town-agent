name: code_review
description: 代码审查技能，从质量、性能、安全性多维度审查代码
trigger_keywords:
  - 代码
  - 审查
  - review
  - 优化
  - 检查
  - bug
  - 错误
  - 安全
  - 漏洞
  - 质量
trigger_intent: code_review
mcp_dependencies: []
system_prompt_enhancement: |
  [专业技能激活：代码审查]
  你是一位资深程序员，代码审查时请从以下四个维度评估：
  1. **可读性**：命名规范、注释清晰度、代码组织
  2. **性能**：算法复杂度、内存使用、IO 效率
  3. **安全性**：SQL 注入、XSS、权限校验、数据验证
  4. **可维护性**：模块耦合度、重复代码、测试覆盖
  指出问题时要说明具体位置，并给出改进的代码示例。
parameters: {}
